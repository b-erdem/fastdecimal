name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MIX_ENV: test

jobs:
  test:
    name: Test (Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Minimum supported (per mix.exs `elixir: "~> 1.15"`)
          - elixir: '1.15'
            otp: '26'
          # Recent stable
          - elixir: '1.17'
            otp: '27'
          # Latest stable (also used for format + dialyzer below)
          - elixir: '1.18'
            otp: '28'

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test

  format:
    name: mix format --check-formatted
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-format-${{ hashFiles('**/mix.lock') }}

      - run: mix deps.get
      - run: mix format --check-formatted

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: '28'
          elixir-version: '1.18'

      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-dialyzer-${{ hashFiles('**/mix.lock') }}

      # Cache the PLT separately — it's expensive to build but only changes
      # when OTP/Elixir/deps change.
      - uses: actions/cache@v4
        with:
          path: priv/plts
          key: ${{ runner.os }}-plt-otp28-elixir1.18-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-otp28-elixir1.18-

      - run: mix deps.get
      - run: mkdir -p priv/plts
      - run: mix dialyzer --plt
      - run: mix dialyzer --format short
